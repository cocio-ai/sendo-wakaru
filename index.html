<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鮮度簡単わかる君 Ver.2</title>
<style>
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
    color: #333;
  }
  
  .container {
    max-width: 600px;
    background-color: #fff;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    margin: auto;
  }
  
  h1 {
    font-size: 24px;
    margin-bottom: 25px;
    text-align: center;
    color: #2c3e50;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
  }
  
  h2 {
    font-size: 18px;
    margin-bottom: 8px;
    color: #555;
    margin-top: 20px;
  }
  
  .input-group {
    display: flex;
    flex-direction: column;
  }

  input[type="date"] {
    font-size: 18px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 100%;
    box-sizing: border-box; /* 枠線を含めたサイズ計算 */
  }

  /* 今日の日付を入れるボタン */
  .today-btn {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    margin-left: 10px;
    vertical-align: middle;
  }
  
  .result-box {
    margin-top: 30px;
    padding: 20px;
    background-color: #f9f9f9;
    border-radius: 8px;
    text-align: center;
  }

  .remaining-label {
    font-size: 14px;
    color: #777;
  }

  .remaining-days {
    font-size: 42px;
    font-weight: bold;
    color: #333;
    margin: 10px 0;
  }
  
  .removal-date {
    font-size: 18px;
    color: #555;
    font-weight: bold;
  }
  
  /* 注意喚起のアニメーション */
  .warning {
    color: #e74c3c; /* 赤色 */
    animation: pulse 1.5s infinite;
  }

  .safe {
    color: #27ae60; /* 緑色 */
  }
  
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

  <div class="container">
    <h1>鮮度簡単わかる君 <span style="font-size:12px; color:#888;">Ver.2</span></h1>
    
    <div class="input-group">
      <h2>
        ST表示日 (開始日)
        <button type="button" class="today-btn" onclick="setToday()">今日にする</button>
      </h2>
      <input type="date" id="startDatePicker" onchange="calculate()">
    </div>
    
    <div class="input-group">
      <h2>賞味期限</h2>
      <input type="date" id="expirationDatePicker" onchange="calculate()">
    </div>
    
    <div class="result-box">
      <div class="remaining-label">販売可能日数</div>
      <div class="remaining-days" id="remainingDays">---</div>
      <div class="removal-date" id="removalDate">---</div>
    </div>
  </div>
  
  <script>
    // ページ読み込み時に初期設定
    window.onload = function() {
        setToday(); // 開始日をデフォルトで「今日」にする
    };

    function setToday() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById("startDatePicker").value = `${yyyy}-${mm}-${dd}`;
        calculate();
    }

    function calculate() {
      const startVal = document.getElementById("startDatePicker").value;
      const expireVal = document.getElementById("expirationDatePicker").value;
      
      const remainingDaysEl = document.getElementById("remainingDays");
      const removalDateEl = document.getElementById("removalDate");

      // 両方の日付が入力されていない場合は計算しない
      if (!startVal || !expireVal) {
        remainingDaysEl.textContent = "---";
        removalDateEl.textContent = "---";
        remainingDaysEl.className = "remaining-days"; // クラスリセット
        return;
      }

      // 日付オブジェクトの作成（時間を0:00:00に統一してズレを防ぐ）
      const startDate = new Date(startVal);
      startDate.setHours(0, 0, 0, 0);

      const expirationDate = new Date(expireVal);
      expirationDate.setHours(0, 0, 0, 0);
      
      // 差分の計算 (ミリ秒 -> 日数)
      const diffTime = expirationDate - startDate;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      // 表示の更新
      remainingDaysEl.textContent = diffDays + " 日";
      
      // 撤去日の表示ロジック
      // 今回はシンプルに「賞味期限日」を撤去日として表示します
      // ※もし「賞味期限の1日前」にするなら、expirationDateから1日引いてください
      const options = { month: 'long', day: 'numeric', weekday: 'short' };
      const formattedRemovalDate = expirationDate.toLocaleDateString('ja-JP', options);
      
      removalDateEl.textContent = "撤去予定日: " + formattedRemovalDate;

      // クラスのリセットと警告判定
      remainingDaysEl.className = "remaining-days"; // リセット
      
      if (diffDays < 0) {
        remainingDaysEl.textContent = "期限切れ (" + diffDays + "日)";
        remainingDaysEl.classList.add("warning");
      } else if (diffDays <= 7) {
        remainingDaysEl.classList.add("warning");
      } else {
        remainingDaysEl.classList.add("safe");
      }
    }
  </script>
</body>
</html>
