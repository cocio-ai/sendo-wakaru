<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鮮度簡単わかる君</title>
<style>
  :root {
    --primary-color: #007AFF;
    --bg-color: #F2F2F7;
    --card-bg: #FFFFFF;
    --text-main: #1C1C1E;
    --text-sub: #8E8E93;
    --safe-color: #34C759;
    --warning-color: #FF9500;
    --danger-color: #FF3B30;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    padding: 16px;
    color: var(--text-main);
  }
  
  .app-header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 10px;
  }
  
  .app-title {
    font-size: 22px;
    font-weight: bold;
    margin: 0;
    letter-spacing: 0.5px;
  }

  /* カードレイアウト */
  .card {
    background-color: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }
  
  .input-group {
    margin-bottom: 20px;
  }
  .input-group:last-child {
    margin-bottom: 0;
  }

  .label-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--text-sub);
  }

  .today-btn {
    background-color: rgba(0, 122, 255, 0.1);
    color: var(--primary-color);
    border: none;
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
  }

  input[type="date"] {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 50px;
    font-size: 18px;
    font-family: inherit;
    padding: 0 16px;
    background-color: #F9F9F9;
    border: 1px solid #E5E5EA;
    border-radius: 12px;
    box-sizing: border-box;
    color: var(--text-main);
    outline: none;
  }

  input[type="date"]:focus {
    border-color: var(--primary-color);
    background-color: #FFF;
  }

  /* 結果表示エリア */
  .result-card {
    text-align: center;
    transition: background-color 0.3s ease;
  }

  .remaining-label {
    font-size: 14px;
    font-weight: 600;
    color: inherit;
    opacity: 0.8;
  }

  .remaining-days {
    font-size: 56px;
    font-weight: 800;
    margin: 5px 0;
    line-height: 1.1;
  }
  
  .removal-date {
    font-size: 16px;
    font-weight: 600;
    margin-top: 10px;
    padding-top: 15px;
    border-top: 1px dashed rgba(0,0,0,0.1);
  }

  /* ステータスカラー */
  .status-neutral {
    background-color: var(--card-bg);
    color: var(--text-main);
  }
  .status-safe {
    background-color: var(--safe-color);
    color: white;
  }
  .status-warning {
    background-color: var(--warning-color);
    color: white;
  }
  .status-danger {
    background-color: var(--danger-color);
    color: white;
  }
</style>
</head>
<body>

  <div class="app-header">
    <h1 class="app-title">鮮度簡単わかる君</h1>
  </div>
  
  <div class="card">
    <div class="input-group">
      <div class="label-area">
        <h2>ST表示日 (開始日)</h2>
        <button type="button" class="today-btn" onclick="setToday()">今日</button>
      </div>
      <input type="date" id="startDatePicker" onchange="calculate()">
    </div>
    
    <div class="input-group">
      <div class="label-area">
        <h2>賞味期限</h2>
      </div>
      <input type="date" id="expirationDatePicker" onchange="calculate()">
    </div>
  </div>
  
  <div class="card result-card status-neutral" id="resultCard">
    <div class="remaining-label">残り販売日数</div>
    <div class="remaining-days" id="remainingDays">-- <span style="font-size:24px;">日</span></div>
    <div class="removal-date" id="removalDate">撤去予定日: --月--日</div>
  </div>
  
  <script>
    window.onload = function() {
        setToday();
    };

    function setToday() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById("startDatePicker").value = `${yyyy}-${mm}-${dd}`;
        calculate();
    }

    function calculate() {
      const startVal = document.getElementById("startDatePicker").value;
      const expireVal = document.getElementById("expirationDatePicker").value;
      
      const remainingDaysEl = document.getElementById("remainingDays");
      const removalDateEl = document.getElementById("removalDate");
      const resultCard = document.getElementById("resultCard");

      // 未入力のリセット
      if (!startVal || !expireVal) {
        remainingDaysEl.innerHTML = '-- <span style="font-size:24px;">日</span>';
        removalDateEl.textContent = "撤去予定日: --月--日";
        resultCard.className = "card result-card status-neutral";
        return;
      }

      const startDate = new Date(startVal);
      startDate.setHours(0, 0, 0, 0);

      const expirationDate = new Date(expireVal);
      expirationDate.setHours(0, 0, 0, 0);
      
      const diffTime = expirationDate - startDate;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      const options = { month: 'numeric', day: 'numeric', weekday: 'short' };
      const formattedRemovalDate = expirationDate.toLocaleDateString('ja-JP', options);
      
      removalDateEl.textContent = "撤去予定日: " + formattedRemovalDate;

      // クラスのリセット
      resultCard.className = "card result-card"; 
      
      // 状況に応じたカラーリングとテキスト表示
      if (diffDays < 0) {
        remainingDaysEl.textContent = "期限切れ";
        remainingDaysEl.style.fontSize = "42px"; // 文字が大きいので少し縮小
        resultCard.classList.add("status-danger");
      } else {
        remainingDaysEl.innerHTML = diffDays + ' <span style="font-size:24px;">日</span>';
        remainingDaysEl.style.fontSize = "56px";
        
        if (diffDays <= 7) {
          resultCard.classList.add("status-warning"); // 7日以下はオレンジ
        } else {
          resultCard.classList.add("status-safe");    // 8日以上はグリーン
        }
      }
    }
  </script>
</body>
</html>
